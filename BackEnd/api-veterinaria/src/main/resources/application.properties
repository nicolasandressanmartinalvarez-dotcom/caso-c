spring.application.name=api-veterinaria

## Configura Hibernate para trabajar con PostgreSQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8086

spring.datasource.url=jdbc:postgresql://localhost:5435/veterinaria_db
spring.datasource.username=admin-vet
spring.datasource.password=password-vet

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
